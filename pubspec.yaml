name: pengingat_kuliah
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies hanya ditulis SATU kali di sini
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.5.6
  firebase_core: ^2.30.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  google_fonts: ^6.2.1
  flutter_slidable: ^3.0.1
  lottie: ^3.1.0
  flutter_dotenv: ^6.0.1

# Kelompok khusus untuk lints dan testing dimasukkan ke sini
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Konfigurasi Flutter
flutter:
  uses-material-design: true

  # Jika nanti ingin menambahkan gambar/assets atau custom fonts, 
  # Anda bisa menambahkannya di bawah baris uses-material-design ini.
  assets:
    - .env